[paths]
# All relative paths are resolved from this settings.ini file.
raw_dir = data/raw
topography_dir = data/topography
satellite_dir = data/satellite
processed_dir = data/processed
results_dir = results

[files]
# Optional file names or paths. Leave empty to let map.py choose/discover inputs.
pro_file =
topography_file =
satellite_file =

[pipeline]
map_script = code/map.py
map_settings_arg = --settings

[plot]
# map.py can use these values when deciding whether to call plot2d.py or plot3d.py.
mode = 3d
variable = w
